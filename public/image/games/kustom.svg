<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="s">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#bg)"/>
  <!-- Sword 1 (top-left to bottom-right) -->
  <!-- Blade -->
  <rect x="54" y="12" width="8" height="60" rx="3" fill="white" fill-opacity="0.85" filter="url(#s)" transform="rotate(40 58 42)"/>
  <!-- Guard -->
  <rect x="44" y="54" width="30" height="7" rx="3" fill="white" fill-opacity="0.75" filter="url(#s)" transform="rotate(40 59 57)"/>
  <!-- Handle -->
  <rect x="56" y="62" width="6" height="22" rx="3" fill="white" fill-opacity="0.65" transform="rotate(40 59 73)"/>
  <!-- Pommel -->
  <circle cx="72" cy="90" r="5" fill="white" fill-opacity="0.7" transform="rotate(40 59 73)"/>

  <!-- Sword 2 (top-right to bottom-left) -->
  <!-- Blade -->
  <rect x="58" y="12" width="8" height="60" rx="3" fill="white" fill-opacity="0.85" filter="url(#s)" transform="rotate(-40 62 42)"/>
  <!-- Guard -->
  <rect x="46" y="54" width="30" height="7" rx="3" fill="white" fill-opacity="0.75" filter="url(#s)" transform="rotate(-40 61 57)"/>
  <!-- Handle -->
  <rect x="58" y="62" width="6" height="22" rx="3" fill="white" fill-opacity="0.65" transform="rotate(-40 61 73)"/>
  <!-- Pommel -->
  <circle cx="48" cy="90" r="5" fill="white" fill-opacity="0.7" transform="rotate(-40 61 73)"/>
</svg>
