<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="s">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#bg)"/>
  <!-- Top bun (rounded rect) -->
  <rect x="22" y="28" width="76" height="22" rx="11" fill="white" fill-opacity="0.9" filter="url(#s)"/>
  <!-- Sesame seeds on top bun -->
  <ellipse cx="45" cy="34" rx="4" ry="2.5" fill="white" fill-opacity="0.5" transform="rotate(-20 45 34)"/>
  <ellipse cx="60" cy="31" rx="4" ry="2.5" fill="white" fill-opacity="0.5" transform="rotate(10 60 31)"/>
  <ellipse cx="75" cy="34" rx="4" ry="2.5" fill="white" fill-opacity="0.5" transform="rotate(15 75 34)"/>
  <!-- Lettuce (wavy line representation) -->
  <path d="M18,56 Q26,50 34,56 Q42,62 50,56 Q58,50 66,56 Q74,62 82,56 Q90,50 98,56 Q106,62 102,58" stroke="white" stroke-opacity="0.7" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Patty (darker rect) -->
  <rect x="18" y="62" width="84" height="14" rx="3" fill="white" fill-opacity="0.55" filter="url(#s)"/>
  <!-- Cheese slice (slightly wider, offset) -->
  <rect x="14" y="77" width="92" height="8" rx="2" fill="white" fill-opacity="0.7"/>
  <!-- Bottom bun -->
  <rect x="22" y="86" width="76" height="18" rx="9" fill="white" fill-opacity="0.85" filter="url(#s)"/>
</svg>
