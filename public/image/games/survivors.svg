<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="s">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#bg)"/>
  <!-- Center character (larger, brighter) -->
  <circle cx="60" cy="60" r="13" fill="white" fill-opacity="0.9" filter="url(#s)"/>
  <circle cx="60" cy="60" r="7" fill="white" fill-opacity="0.45"/>
  <!-- Enemy ring (8 smaller dots arranged in a circle, r=38) -->
  <!-- Top -->
  <circle cx="60" cy="22" r="7" fill="white" fill-opacity="0.65" filter="url(#s)"/>
  <!-- Top-right -->
  <circle cx="87" cy="33" r="7" fill="white" fill-opacity="0.65" filter="url(#s)"/>
  <!-- Right -->
  <circle cx="98" cy="60" r="7" fill="white" fill-opacity="0.65" filter="url(#s)"/>
  <!-- Bottom-right -->
  <circle cx="87" cy="87" r="7" fill="white" fill-opacity="0.65" filter="url(#s)"/>
  <!-- Bottom -->
  <circle cx="60" cy="98" r="7" fill="white" fill-opacity="0.65" filter="url(#s)"/>
  <!-- Bottom-left -->
  <circle cx="33" cy="87" r="7" fill="white" fill-opacity="0.65" filter="url(#s)"/>
  <!-- Left -->
  <circle cx="22" cy="60" r="7" fill="white" fill-opacity="0.65" filter="url(#s)"/>
  <!-- Top-left -->
  <circle cx="33" cy="33" r="7" fill="white" fill-opacity="0.65" filter="url(#s)"/>
</svg>
