<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#bg)"/>
  <!-- 3x3 sliding puzzle: 8 tiles + 1 empty cell (bottom-right) -->
  <!-- Row 1 -->
  <rect x="11" y="11" width="30" height="30" rx="5" fill="white" fill-opacity="0.85" filter="url(#shadow)"/>
  <text x="26" y="31" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#10b981">1</text>
  <rect x="45" y="11" width="30" height="30" rx="5" fill="white" fill-opacity="0.85" filter="url(#shadow)"/>
  <text x="60" y="31" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#10b981">2</text>
  <rect x="79" y="11" width="30" height="30" rx="5" fill="white" fill-opacity="0.85" filter="url(#shadow)"/>
  <text x="94" y="31" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#10b981">3</text>
  <!-- Row 2 -->
  <rect x="11" y="45" width="30" height="30" rx="5" fill="white" fill-opacity="0.85" filter="url(#shadow)"/>
  <text x="26" y="65" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#10b981">4</text>
  <rect x="45" y="45" width="30" height="30" rx="5" fill="white" fill-opacity="0.85" filter="url(#shadow)"/>
  <text x="60" y="65" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#10b981">5</text>
  <rect x="79" y="45" width="30" height="30" rx="5" fill="white" fill-opacity="0.85" filter="url(#shadow)"/>
  <text x="94" y="65" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#10b981">6</text>
  <!-- Row 3: tiles 7, 8, empty -->
  <rect x="11" y="79" width="30" height="30" rx="5" fill="white" fill-opacity="0.85" filter="url(#shadow)"/>
  <text x="26" y="99" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#10b981">7</text>
  <rect x="45" y="79" width="30" height="30" rx="5" fill="white" fill-opacity="0.85" filter="url(#shadow)"/>
  <text x="60" y="99" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#10b981">8</text>
  <!-- Empty cell (bottom-right gap) -->
  <rect x="79" y="79" width="30" height="30" rx="5" fill="white" fill-opacity="0.15"/>
</svg>
