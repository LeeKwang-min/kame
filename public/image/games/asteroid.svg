<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#bg)"/>
  <!-- Large asteroid (irregular polygon) -->
  <polygon points="28,32 42,24 58,28 62,42 54,52 36,54 22,46" fill="white" fill-opacity="0.6" filter="url(#shadow)"/>
  <!-- Small asteroid -->
  <polygon points="78,22 88,20 94,28 90,36 80,36 74,30" fill="white" fill-opacity="0.5"/>
  <!-- Player spaceship (triangle pointing up) -->
  <polygon points="60,82 48,102 60,97 72,102" fill="white" fill-opacity="0.9" filter="url(#shadow)"/>
  <!-- Engine thrust -->
  <polygon points="55,100 60,110 65,100" fill="white" fill-opacity="0.4"/>
  <!-- Stars -->
  <circle cx="85" cy="55" r="1.5" fill="white" fill-opacity="0.6"/>
  <circle cx="32" cy="72" r="1.5" fill="white" fill-opacity="0.6"/>
  <circle cx="96" cy="70" r="1" fill="white" fill-opacity="0.5"/>
  <circle cx="16" cy="90" r="1" fill="white" fill-opacity="0.5"/>
  <circle cx="100" cy="44" r="1" fill="white" fill-opacity="0.5"/>
</svg>
