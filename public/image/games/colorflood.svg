<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#bg)"/>
  <!-- 3x3 grid of colored squares with varying opacities -->
  <rect x="12" y="12" width="30" height="30" rx="5" fill="white" fill-opacity="0.9" filter="url(#shadow)"/>
  <rect x="45" y="12" width="30" height="30" rx="5" fill="white" fill-opacity="0.4" filter="url(#shadow)"/>
  <rect x="78" y="12" width="30" height="30" rx="5" fill="white" fill-opacity="0.7" filter="url(#shadow)"/>
  <rect x="12" y="45" width="30" height="30" rx="5" fill="white" fill-opacity="0.5" filter="url(#shadow)"/>
  <rect x="45" y="45" width="30" height="30" rx="5" fill="white" fill-opacity="0.9" filter="url(#shadow)"/>
  <rect x="78" y="45" width="30" height="30" rx="5" fill="white" fill-opacity="0.6" filter="url(#shadow)"/>
  <rect x="12" y="78" width="30" height="30" rx="5" fill="white" fill-opacity="0.8" filter="url(#shadow)"/>
  <rect x="45" y="78" width="30" height="30" rx="5" fill="white" fill-opacity="0.9" filter="url(#shadow)"/>
  <rect x="78" y="78" width="30" height="30" rx="5" fill="white" fill-opacity="0.45" filter="url(#shadow)"/>
</svg>
