<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#bg)"/>
  <!-- Number hints along top edge -->
  <text x="60" y="22" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="white" fill-opacity="0.9">2</text>
  <text x="77" y="22" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="white" fill-opacity="0.9">1</text>
  <text x="94" y="22" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="white" fill-opacity="0.9">3</text>
  <!-- Number hints along left edge -->
  <text x="22" y="50" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="white" fill-opacity="0.9">1</text>
  <text x="22" y="67" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="white" fill-opacity="0.9">3</text>
  <text x="22" y="84" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="white" fill-opacity="0.9">2</text>
  <text x="22" y="101" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="white" fill-opacity="0.9">1</text>
  <!-- Grid cells (4x4, starting at x=43, y=28, cell size=17) -->
  <!-- Row 1: filled, empty, filled, empty -->
  <rect x="43" y="28" width="17" height="17" rx="2" fill="white" fill-opacity="0.85" filter="url(#shadow)"/>
  <rect x="60" y="28" width="17" height="17" rx="2" fill="white" fill-opacity="0.15"/>
  <rect x="77" y="28" width="17" height="17" rx="2" fill="white" fill-opacity="0.85" filter="url(#shadow)"/>
  <rect x="94" y="28" width="17" height="17" rx="2" fill="white" fill-opacity="0.15"/>
  <!-- Row 2: filled, filled, filled, empty -->
  <rect x="43" y="46" width="17" height="17" rx="2" fill="white" fill-opacity="0.85" filter="url(#shadow)"/>
  <rect x="60" y="46" width="17" height="17" rx="2" fill="white" fill-opacity="0.85" filter="url(#shadow)"/>
  <rect x="77" y="46" width="17" height="17" rx="2" fill="white" fill-opacity="0.85" filter="url(#shadow)"/>
  <rect x="94" y="46" width="17" height="17" rx="2" fill="white" fill-opacity="0.15"/>
  <!-- Row 3: empty, filled, filled, empty -->
  <rect x="43" y="64" width="17" height="17" rx="2" fill="white" fill-opacity="0.15"/>
  <rect x="60" y="64" width="17" height="17" rx="2" fill="white" fill-opacity="0.85" filter="url(#shadow)"/>
  <rect x="77" y="64" width="17" height="17" rx="2" fill="white" fill-opacity="0.85" filter="url(#shadow)"/>
  <rect x="94" y="64" width="17" height="17" rx="2" fill="white" fill-opacity="0.15"/>
  <!-- Row 4: empty, filled, empty, empty -->
  <rect x="43" y="82" width="17" height="17" rx="2" fill="white" fill-opacity="0.15"/>
  <rect x="60" y="82" width="17" height="17" rx="2" fill="white" fill-opacity="0.85" filter="url(#shadow)"/>
  <rect x="77" y="82" width="17" height="17" rx="2" fill="white" fill-opacity="0.15"/>
  <rect x="94" y="82" width="17" height="17" rx="2" fill="white" fill-opacity="0.15"/>
</svg>
