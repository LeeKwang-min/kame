<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eab308"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#bg)"/>
  <!-- 4 colored cards in a row -->
  <!-- Card 1 - dim -->
  <rect x="10" y="40" width="22" height="38" rx="4" fill="white" fill-opacity="0.4" filter="url(#shadow)"/>
  <!-- Card 2 - medium -->
  <rect x="36" y="34" width="22" height="44" rx="4" fill="white" fill-opacity="0.6" filter="url(#shadow)"/>
  <!-- Card 3 - brighter -->
  <rect x="62" y="28" width="22" height="50" rx="4" fill="white" fill-opacity="0.8" filter="url(#shadow)"/>
  <!-- Card 4 - brightest -->
  <rect x="88" y="22" width="22" height="56" rx="4" fill="white" fill-opacity="0.9" filter="url(#shadow)"/>
  <!-- Question mark on card 1 to suggest memory -->
  <text x="21" y="65" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" fill-opacity="0.6" text-anchor="middle">?</text>
  <!-- Check mark hint on card 4 -->
  <text x="99" y="55" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" fill-opacity="0.85" text-anchor="middle">✓</text>
  <!-- Bottom label dots (memory indicator) -->
  <circle cx="21" cy="88" r="4" fill="white" fill-opacity="0.4"/>
  <circle cx="47" cy="88" r="4" fill="white" fill-opacity="0.6"/>
  <circle cx="73" cy="88" r="4" fill="white" fill-opacity="0.8"/>
  <circle cx="99" cy="88" r="4" fill="white" fill-opacity="0.9"/>
</svg>
