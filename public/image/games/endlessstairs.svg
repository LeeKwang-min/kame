<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="s">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#bg)"/>
  <!-- Staircase steps going up-right (5 steps) -->
  <!-- Step 1 (bottom-left) -->
  <rect x="10" y="90" width="22" height="20" rx="2" fill="white" fill-opacity="0.5"/>
  <rect x="10" y="88" width="22" height="5" rx="1" fill="white" fill-opacity="0.75" filter="url(#s)"/>
  <!-- Step 2 -->
  <rect x="30" y="72" width="22" height="20" rx="2" fill="white" fill-opacity="0.5"/>
  <rect x="30" y="70" width="22" height="5" rx="1" fill="white" fill-opacity="0.75" filter="url(#s)"/>
  <!-- Step 3 -->
  <rect x="50" y="54" width="22" height="20" rx="2" fill="white" fill-opacity="0.5"/>
  <rect x="50" y="52" width="22" height="5" rx="1" fill="white" fill-opacity="0.75" filter="url(#s)"/>
  <!-- Step 4 -->
  <rect x="70" y="36" width="22" height="20" rx="2" fill="white" fill-opacity="0.5"/>
  <rect x="70" y="34" width="22" height="5" rx="1" fill="white" fill-opacity="0.75" filter="url(#s)"/>
  <!-- Step 5 -->
  <rect x="90" y="18" width="22" height="20" rx="2" fill="white" fill-opacity="0.5"/>
  <rect x="90" y="16" width="22" height="5" rx="1" fill="white" fill-opacity="0.75" filter="url(#s)"/>
  <!-- Small character dot on step 3 -->
  <circle cx="62" cy="47" r="6" fill="white" fill-opacity="0.9" filter="url(#s)"/>
</svg>
