<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#bg)"/>
  <!-- 3 concentric circles -->
  <circle cx="60" cy="60" r="48" fill="none" stroke="white" stroke-opacity="0.3" stroke-width="3"/>
  <circle cx="60" cy="60" r="32" fill="none" stroke="white" stroke-opacity="0.55" stroke-width="3"/>
  <circle cx="60" cy="60" r="16" fill="none" stroke="white" stroke-opacity="0.8" stroke-width="3"/>
  <!-- Center dot -->
  <circle cx="60" cy="60" r="5" fill="white" fill-opacity="0.9" filter="url(#shadow)"/>
  <!-- Numbers between rings (representing values) -->
  <text x="60" y="38" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="white" fill-opacity="0.8">3</text>
  <text x="60" y="51" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="white" fill-opacity="0.85">2</text>
  <text x="60" y="62" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="white" fill-opacity="0.9">1</text>
</svg>
