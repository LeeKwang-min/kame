<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#bg)"/>
  <!-- Zigzag enemy path (from left top to bottom right) -->
  <polyline points="14,30 34,50 14,70 34,90 54,90" stroke="white" stroke-opacity="0.35" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Enemy on path (circle with legs) -->
  <circle cx="24" cy="40" r="7" fill="white" fill-opacity="0.55"/>
  <line x1="20" y1="46" x2="18" y2="52" stroke="white" stroke-opacity="0.5" stroke-width="2" stroke-linecap="round"/>
  <line x1="28" y1="46" x2="30" y2="52" stroke="white" stroke-opacity="0.5" stroke-width="2" stroke-linecap="round"/>
  <!-- Second enemy -->
  <circle cx="24" cy="60" r="7" fill="white" fill-opacity="0.45"/>
  <!-- Tower/turret shape (right side) -->
  <!-- Base -->
  <rect x="72" y="82" width="34" height="24" rx="4" fill="white" fill-opacity="0.75" filter="url(#shadow)"/>
  <!-- Turret body -->
  <rect x="80" y="62" width="18" height="24" rx="4" fill="white" fill-opacity="0.85" filter="url(#shadow)"/>
  <!-- Battlements (top of tower) -->
  <rect x="78" y="56" width="8" height="10" rx="2" fill="white" fill-opacity="0.9"/>
  <rect x="90" y="56" width="8" height="10" rx="2" fill="white" fill-opacity="0.9"/>
  <!-- Cannon barrel -->
  <rect x="66" y="70" width="20" height="6" rx="3" fill="white" fill-opacity="0.9" filter="url(#shadow)"/>
  <!-- Cannon ball / shot -->
  <circle cx="56" cy="73" r="4" fill="white" fill-opacity="0.8"/>
  <!-- Arrow/projectile line -->
  <line x1="61" y1="73" x2="46" y2="55" stroke="white" stroke-opacity="0.45" stroke-width="2" stroke-dasharray="4,3" stroke-linecap="round"/>
</svg>
