<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#bg)"/>
  <!-- 2x2 grid of number tiles -->
  <!-- Tile: 2 -->
  <rect x="14" y="14" width="42" height="42" rx="8" fill="white" fill-opacity="0.9" filter="url(#shadow)"/>
  <text x="35" y="43" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#10b981">2</text>
  <!-- Tile: 4 -->
  <rect x="64" y="14" width="42" height="42" rx="8" fill="white" fill-opacity="0.8" filter="url(#shadow)"/>
  <text x="85" y="43" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#06b6d4">4</text>
  <!-- Tile: 8 -->
  <rect x="14" y="64" width="42" height="42" rx="8" fill="white" fill-opacity="0.7" filter="url(#shadow)"/>
  <text x="35" y="93" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#10b981">8</text>
  <!-- Tile: 16 -->
  <rect x="64" y="64" width="42" height="42" rx="8" fill="white" fill-opacity="0.6" filter="url(#shadow)"/>
  <text x="85" y="93" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#06b6d4">16</text>
</svg>
