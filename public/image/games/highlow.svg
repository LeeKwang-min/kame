<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#bg)"/>
  <!-- Playing card shape -->
  <rect x="30" y="32" width="60" height="56" rx="7" fill="white" fill-opacity="0.8" filter="url(#shadow)"/>
  <!-- Card suit symbol (spade-like) -->
  <text x="60" y="67" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#a855f7" text-anchor="middle">A</text>
  <!-- Small suit in corners -->
  <text x="38" y="47" font-family="Arial, sans-serif" font-size="11" fill="#a855f7" fill-opacity="0.8">♠</text>
  <text x="75" y="82" font-family="Arial, sans-serif" font-size="11" fill="#a855f7" fill-opacity="0.8" transform="rotate(180,82.5,77)">♠</text>
  <!-- Up arrow above card -->
  <polygon points="60,12 50,26 55,26 55,32 65,32 65,26 70,26" fill="white" fill-opacity="0.85" filter="url(#shadow)"/>
  <!-- Down arrow below card -->
  <polygon points="60,108 50,94 55,94 55,88 65,88 65,94 70,94" fill="white" fill-opacity="0.85" filter="url(#shadow)"/>
</svg>
