<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#bg)"/>
  <!-- Road (dark strip) -->
  <rect x="30" y="14" width="60" height="92" rx="6" fill="white" fill-opacity="0.15"/>
  <!-- Road lane dashes (center line) -->
  <rect x="57" y="18" width="6" height="14" rx="3" fill="white" fill-opacity="0.4"/>
  <rect x="57" y="36" width="6" height="14" rx="3" fill="white" fill-opacity="0.4"/>
  <rect x="57" y="54" width="6" height="14" rx="3" fill="white" fill-opacity="0.4"/>
  <rect x="57" y="72" width="6" height="14" rx="3" fill="white" fill-opacity="0.4"/>
  <rect x="57" y="90" width="6" height="14" rx="3" fill="white" fill-opacity="0.4"/>
  <!-- Car body (rounded rect, top-down view) -->
  <rect x="40" y="58" width="40" height="52" rx="8" fill="white" fill-opacity="0.9" filter="url(#shadow)"/>
  <!-- Car windshield -->
  <rect x="46" y="62" width="28" height="14" rx="4" fill="#ef4444" fill-opacity="0.6"/>
  <!-- Car wheels -->
  <rect x="35" y="62" width="8" height="12" rx="3" fill="white" fill-opacity="0.7"/>
  <rect x="77" y="62" width="8" height="12" rx="3" fill="white" fill-opacity="0.7"/>
  <rect x="35" y="90" width="8" height="12" rx="3" fill="white" fill-opacity="0.7"/>
  <rect x="77" y="90" width="8" height="12" rx="3" fill="white" fill-opacity="0.7"/>
</svg>
