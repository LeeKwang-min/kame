<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="s">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#bg)"/>
  <!-- Obstacle bars (top and bottom gaps) -->
  <rect x="80" y="8" width="16" height="30" rx="3" fill="white" fill-opacity="0.55" filter="url(#s)"/>
  <rect x="80" y="80" width="16" height="34" rx="3" fill="white" fill-opacity="0.55" filter="url(#s)"/>
  <!-- Helicopter body -->
  <ellipse cx="46" cy="62" rx="28" ry="14" fill="white" fill-opacity="0.88" filter="url(#s)"/>
  <!-- Cockpit window -->
  <ellipse cx="58" cy="60" rx="10" ry="8" fill="white" fill-opacity="0.45"/>
  <!-- Tail boom -->
  <rect x="14" y="61" width="20" height="6" rx="3" fill="white" fill-opacity="0.75"/>
  <!-- Tail rotor vertical line -->
  <line x1="16" y1="52" x2="16" y2="74" stroke="white" stroke-width="4" stroke-opacity="0.7" stroke-linecap="round"/>
  <!-- Main rotor (horizontal line above body) -->
  <line x1="16" y1="46" x2="76" y2="46" stroke="white" stroke-width="4" stroke-opacity="0.8" stroke-linecap="round" filter="url(#s)"/>
  <!-- Rotor hub -->
  <circle cx="46" cy="46" r="4" fill="white" fill-opacity="0.9"/>
  <!-- Skids -->
  <line x1="30" y1="76" x2="50" y2="76" stroke="white" stroke-width="3" stroke-opacity="0.65" stroke-linecap="round"/>
  <rect x="28" y="73" width="4" height="5" rx="1" fill="white" fill-opacity="0.5"/>
  <rect x="48" y="73" width="4" height="5" rx="1" fill="white" fill-opacity="0.5"/>
</svg>
