<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#bg)"/>
  <!-- Chart grid lines (subtle) -->
  <line x1="14" y1="96" x2="106" y2="96" stroke="white" stroke-width="1.5" stroke-opacity="0.3"/>
  <line x1="14" y1="78" x2="106" y2="78" stroke="white" stroke-width="1" stroke-opacity="0.2"/>
  <line x1="14" y1="60" x2="106" y2="60" stroke="white" stroke-width="1" stroke-opacity="0.2"/>
  <line x1="14" y1="42" x2="106" y2="42" stroke="white" stroke-width="1" stroke-opacity="0.2"/>
  <!-- Candlestick 1 - bearish (down, tall) -->
  <!-- Wick top -->
  <line x1="26" y1="30" x2="26" y2="44" stroke="white" stroke-width="1.5" stroke-opacity="0.6"/>
  <!-- Body (red-ish = lower opacity) -->
  <rect x="21" y="44" width="10" height="22" rx="2" fill="white" fill-opacity="0.45" filter="url(#shadow)"/>
  <!-- Wick bottom -->
  <line x1="26" y1="66" x2="26" y2="78" stroke="white" stroke-width="1.5" stroke-opacity="0.6"/>
  <!-- Candlestick 2 - bullish (up, medium) -->
  <line x1="46" y1="55" x2="46" y2="62" stroke="white" stroke-width="1.5" stroke-opacity="0.7"/>
  <rect x="41" y="62" width="10" height="20" rx="2" fill="white" fill-opacity="0.8" filter="url(#shadow)"/>
  <line x1="46" y1="82" x2="46" y2="88" stroke="white" stroke-width="1.5" stroke-opacity="0.7"/>
  <!-- Candlestick 3 - bearish (down, short) -->
  <line x1="66" y1="40" x2="66" y2="48" stroke="white" stroke-width="1.5" stroke-opacity="0.6"/>
  <rect x="61" y="48" width="10" height="14" rx="2" fill="white" fill-opacity="0.45" filter="url(#shadow)"/>
  <line x1="66" y1="62" x2="66" y2="72" stroke="white" stroke-width="1.5" stroke-opacity="0.6"/>
  <!-- Candlestick 4 - bullish (up, tall) -->
  <line x1="86" y1="28" x2="86" y2="38" stroke="white" stroke-width="1.5" stroke-opacity="0.7"/>
  <rect x="81" y="38" width="10" height="32" rx="2" fill="white" fill-opacity="0.85" filter="url(#shadow)"/>
  <line x1="86" y1="70" x2="86" y2="80" stroke="white" stroke-width="1.5" stroke-opacity="0.7"/>
  <!-- Upward trend arrow -->
  <polyline points="18,90 40,72 62,64 94,38" fill="none" stroke="white" stroke-width="2" stroke-opacity="0.55" stroke-dasharray="5,3"/>
</svg>
