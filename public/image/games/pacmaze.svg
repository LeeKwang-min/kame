<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#bg)"/>
  <!-- Wall lines (maze corridors) -->
  <rect x="14" y="20" width="40" height="5" rx="2.5" fill="white" fill-opacity="0.3"/>
  <rect x="66" y="20" width="40" height="5" rx="2.5" fill="white" fill-opacity="0.3"/>
  <rect x="14" y="20" width="5" height="40" rx="2.5" fill="white" fill-opacity="0.3"/>
  <rect x="101" y="20" width="5" height="40" rx="2.5" fill="white" fill-opacity="0.3"/>
  <!-- Pac-Man wedge (mouth open ~40 degrees) -->
  <path d="M44 60 L44 36 A24 24 0 1 1 44 84 Z" fill="white" fill-opacity="0.9" filter="url(#shadow)"/>
  <!-- Eye -->
  <circle cx="40" cy="44" r="3" fill="#ef4444" fill-opacity="0.9"/>
  <!-- Dots -->
  <circle cx="80" cy="60" r="4.5" fill="white" fill-opacity="0.8"/>
  <circle cx="94" cy="60" r="4.5" fill="white" fill-opacity="0.8"/>
  <circle cx="66" cy="60" r="4.5" fill="white" fill-opacity="0.8"/>
  <!-- Bottom wall lines -->
  <rect x="14" y="95" width="40" height="5" rx="2.5" fill="white" fill-opacity="0.3"/>
  <rect x="66" y="95" width="40" height="5" rx="2.5" fill="white" fill-opacity="0.3"/>
  <rect x="14" y="60" width="5" height="40" rx="2.5" fill="white" fill-opacity="0.3"/>
  <rect x="101" y="60" width="5" height="40" rx="2.5" fill="white" fill-opacity="0.3"/>
</svg>
