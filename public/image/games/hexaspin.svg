<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="s">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#bg)"/>
  <!-- Regular hexagon outline (center 60,60, radius 40, rotated 15deg) -->
  <!-- Vertices at r=40:
       0°+15°=15°:  (60+40*cos15, 60+40*sin15) ≈ (98.6, 70.4)
       60°+15°=75°: (60+40*cos75, 60+40*sin75) ≈ (70.4, 98.6)
       120°+15°=135°:(60+40*cos135,60+40*sin135)≈ (31.7,88.3)...
       Let me use clean flat-top hex rotated 15:
       Actually use pointy-top hex (0 deg = top): vertices at angles 90,150,210,270,330,30 -->
  <!-- Pointy-top hexagon vertices (r=40, center 60,60):
       90°:  (60, 20)
       150°: (60+40*cos150, 60+40*sin150) = (60-34.6, 60+20) = (25.4, 80)
       210°: (60+40*cos210, 60+40*sin210) = (60-34.6, 60-20) = (25.4, 40)
       270°: (60, 100)  ... wait that's wrong direction
       Let me recalc properly (standard math angles, y-down):
       angle 90° (top):    x=60+40*cos(90°)=60+0=60,    y=60-40*sin(90°)=60-40=20
       angle 30° (top-right): x=60+40*cos(30°)=60+34.6=94.6, y=60-40*sin(30°)=60-20=40
       angle -30° (bot-right): x=94.6,  y=60+20=80
       angle -90° (bottom):  x=60,    y=60+40=100
       angle -150° (bot-left): x=25.4,  y=80
       angle 150° (top-left):  x=25.4,  y=40
  -->
  <polygon points="60,20 94.6,40 94.6,80 60,100 25.4,80 25.4,40"
    fill="none" stroke="white" stroke-opacity="0.8" stroke-width="5"
    stroke-linejoin="round" filter="url(#s)"/>
  <!-- Center dot -->
  <circle cx="60" cy="60" r="5" fill="white" fill-opacity="0.45"/>
  <!-- Small ball on one edge (top-right edge midpoint) -->
  <!-- Midpoint of top→top-right: ((60+94.6)/2, (20+40)/2) = (77.3, 30) -->
  <circle cx="77" cy="30" r="8" fill="white" fill-opacity="0.9" filter="url(#s)"/>
  <!-- Rotation hint arc -->
  <path d="M 94.6,56 A 36,36 0 0 0 78,24" stroke="white" stroke-width="2.5" stroke-opacity="0.4" fill="none" stroke-dasharray="5,4" stroke-linecap="round"/>
  <polygon points="78,24 85,20 80,30" fill="white" fill-opacity="0.4"/>
</svg>
