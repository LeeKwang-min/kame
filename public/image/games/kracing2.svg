<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#bg)"/>
  <!-- Road background -->
  <rect x="10" y="14" width="100" height="92" rx="6" fill="white" fill-opacity="0.12"/>
  <!-- Center lane dash -->
  <rect x="57" y="18" width="6" height="12" rx="3" fill="white" fill-opacity="0.35"/>
  <rect x="57" y="34" width="6" height="12" rx="3" fill="white" fill-opacity="0.35"/>
  <rect x="57" y="50" width="6" height="12" rx="3" fill="white" fill-opacity="0.35"/>
  <rect x="57" y="66" width="6" height="12" rx="3" fill="white" fill-opacity="0.35"/>
  <rect x="57" y="82" width="6" height="12" rx="3" fill="white" fill-opacity="0.35"/>
  <rect x="57" y="98" width="6" height="12" rx="3" fill="white" fill-opacity="0.35"/>
  <!-- Left car (player) - top-down view -->
  <rect x="16" y="56" width="34" height="48" rx="7" fill="white" fill-opacity="0.9" filter="url(#shadow)"/>
  <rect x="21" y="60" width="24" height="12" rx="4" fill="#ef4444" fill-opacity="0.6"/>
  <rect x="12" y="60" width="7" height="10" rx="3" fill="white" fill-opacity="0.65"/>
  <rect x="47" y="60" width="7" height="10" rx="3" fill="white" fill-opacity="0.65"/>
  <rect x="12" y="86" width="7" height="10" rx="3" fill="white" fill-opacity="0.65"/>
  <rect x="47" y="86" width="7" height="10" rx="3" fill="white" fill-opacity="0.65"/>
  <!-- Right car (opponent) - top-down view, slightly ahead -->
  <rect x="70" y="40" width="34" height="48" rx="7" fill="white" fill-opacity="0.75" filter="url(#shadow)"/>
  <rect x="75" y="44" width="24" height="12" rx="4" fill="white" fill-opacity="0.35"/>
  <rect x="66" y="44" width="7" height="10" rx="3" fill="white" fill-opacity="0.55"/>
  <rect x="101" y="44" width="7" height="10" rx="3" fill="white" fill-opacity="0.55"/>
  <rect x="66" y="70" width="7" height="10" rx="3" fill="white" fill-opacity="0.55"/>
  <rect x="101" y="70" width="7" height="10" rx="3" fill="white" fill-opacity="0.55"/>
</svg>
