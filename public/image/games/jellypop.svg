<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#bg)"/>
  <!-- Cluster of jelly shapes (rounded squares) in slightly different opacities -->
  <!-- Bottom row -->
  <rect x="15" y="68" width="28" height="28" rx="10" fill="white" fill-opacity="0.6" filter="url(#shadow)"/>
  <rect x="46" y="68" width="28" height="28" rx="10" fill="white" fill-opacity="0.8" filter="url(#shadow)"/>
  <rect x="77" y="68" width="28" height="28" rx="10" fill="white" fill-opacity="0.55" filter="url(#shadow)"/>
  <!-- Middle row -->
  <rect x="30" y="39" width="28" height="28" rx="10" fill="white" fill-opacity="0.9" filter="url(#shadow)"/>
  <rect x="62" y="39" width="28" height="28" rx="10" fill="white" fill-opacity="0.7" filter="url(#shadow)"/>
  <!-- Top -->
  <rect x="46" y="12" width="28" height="28" rx="10" fill="white" fill-opacity="0.45" filter="url(#shadow)"/>
  <!-- Highlight dots on jelly shapes -->
  <circle cx="39" cy="48" r="4" fill="white" fill-opacity="0.9"/>
  <circle cx="71" cy="48" r="4" fill="white" fill-opacity="0.9"/>
  <circle cx="60" cy="21" r="3" fill="white" fill-opacity="0.9"/>
</svg>
