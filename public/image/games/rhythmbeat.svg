<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eab308"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#bg)"/>
  <!-- 4 vertical rhythm lanes -->
  <rect x="14" y="16" width="20" height="72" rx="4" fill="white" fill-opacity="0.2"/>
  <rect x="38" y="16" width="20" height="72" rx="4" fill="white" fill-opacity="0.2"/>
  <rect x="62" y="16" width="20" height="72" rx="4" fill="white" fill-opacity="0.2"/>
  <rect x="86" y="16" width="20" height="72" rx="4" fill="white" fill-opacity="0.2"/>
  <!-- Falling note blocks in lanes -->
  <rect x="14" y="22" width="20" height="14" rx="3" fill="white" fill-opacity="0.85" filter="url(#shadow)"/>
  <rect x="38" y="40" width="20" height="14" rx="3" fill="white" fill-opacity="0.7" filter="url(#shadow)"/>
  <rect x="62" y="30" width="20" height="14" rx="3" fill="white" fill-opacity="0.8" filter="url(#shadow)"/>
  <rect x="86" y="50" width="20" height="14" rx="3" fill="white" fill-opacity="0.6" filter="url(#shadow)"/>
  <!-- Hit zone line -->
  <rect x="10" y="96" width="100" height="3" rx="1.5" fill="white" fill-opacity="0.6"/>
  <!-- Hit circles at bottom of each lane -->
  <circle cx="24" cy="100" r="8" fill="white" fill-opacity="0.5" filter="url(#shadow)"/>
  <circle cx="48" cy="100" r="8" fill="white" fill-opacity="0.85" filter="url(#shadow)"/>
  <circle cx="72" cy="100" r="8" fill="white" fill-opacity="0.5" filter="url(#shadow)"/>
  <circle cx="96" cy="100" r="8" fill="white" fill-opacity="0.5" filter="url(#shadow)"/>
  <!-- Music note in lane 2 (active) -->
  <circle cx="48" cy="47" r="5" fill="white" fill-opacity="0.5"/>
  <line x1="53" y1="47" x2="53" y2="35" stroke="white" stroke-width="2" stroke-opacity="0.5"/>
</svg>
