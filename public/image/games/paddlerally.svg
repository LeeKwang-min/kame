<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#bg)"/>
  <!-- Center dividing line (dashed) -->
  <rect x="57" y="14" width="6" height="10" rx="3" fill="white" fill-opacity="0.35"/>
  <rect x="57" y="28" width="6" height="10" rx="3" fill="white" fill-opacity="0.35"/>
  <rect x="57" y="42" width="6" height="10" rx="3" fill="white" fill-opacity="0.35"/>
  <rect x="57" y="56" width="6" height="10" rx="3" fill="white" fill-opacity="0.35"/>
  <rect x="57" y="70" width="6" height="10" rx="3" fill="white" fill-opacity="0.35"/>
  <rect x="57" y="84" width="6" height="10" rx="3" fill="white" fill-opacity="0.35"/>
  <rect x="57" y="98" width="6" height="10" rx="3" fill="white" fill-opacity="0.35"/>
  <!-- Left paddle -->
  <rect x="16" y="44" width="10" height="34" rx="5" fill="white" fill-opacity="0.9" filter="url(#shadow)"/>
  <!-- Right paddle -->
  <rect x="94" y="44" width="10" height="34" rx="5" fill="white" fill-opacity="0.9" filter="url(#shadow)"/>
  <!-- Ball in middle -->
  <circle cx="60" cy="60" r="9" fill="white" fill-opacity="0.95" filter="url(#shadow)"/>
  <!-- Ball motion trail -->
  <circle cx="48" cy="54" r="4" fill="white" fill-opacity="0.35"/>
  <circle cx="38" cy="50" r="2.5" fill="white" fill-opacity="0.2"/>
</svg>
