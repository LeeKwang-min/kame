<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#bg)"/>
  <!-- Cluster of bubbles at top (hexagonal arrangement) -->
  <!-- Row 1 (3 bubbles) -->
  <circle cx="40" cy="28" r="13" fill="white" fill-opacity="0.8" filter="url(#shadow)"/>
  <circle cx="66" cy="28" r="13" fill="white" fill-opacity="0.8" filter="url(#shadow)"/>
  <circle cx="92" cy="28" r="13" fill="white" fill-opacity="0.8" filter="url(#shadow)"/>
  <!-- Row 2 (2 bubbles, offset) -->
  <circle cx="53" cy="51" r="13" fill="white" fill-opacity="0.7" filter="url(#shadow)"/>
  <circle cx="79" cy="51" r="13" fill="white" fill-opacity="0.7" filter="url(#shadow)"/>
  <!-- Shine highlights on bubbles -->
  <circle cx="36" cy="24" r="4" fill="white" fill-opacity="0.5"/>
  <circle cx="62" cy="24" r="4" fill="white" fill-opacity="0.5"/>
  <circle cx="88" cy="24" r="4" fill="white" fill-opacity="0.5"/>
  <!-- Shooter base (triangle/turret at bottom) -->
  <polygon points="60,108 42,88 78,88" fill="white" fill-opacity="0.9" filter="url(#shadow)"/>
  <rect x="52" y="84" width="16" height="8" rx="3" fill="white" fill-opacity="0.6"/>
  <!-- Shot trajectory (dashed line) -->
  <line x1="60" y1="84" x2="66" y2="64" stroke="white" stroke-opacity="0.4" stroke-width="2" stroke-dasharray="4,3"/>
</svg>
