<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#bg)"/>
  <!-- 3 cards: 2 face-down + 1 face-up, arranged in a row -->
  <!-- Card 1: face-down -->
  <rect x="8" y="28" width="32" height="44" rx="5" fill="white" fill-opacity="0.5" filter="url(#shadow)"/>
  <rect x="12" y="32" width="24" height="36" rx="3" fill="white" fill-opacity="0.3"/>
  <!-- Pattern on face-down card -->
  <line x1="16" y1="36" x2="32" y2="64" stroke="white" stroke-opacity="0.5" stroke-width="1.5"/>
  <line x1="32" y1="36" x2="16" y2="64" stroke="white" stroke-opacity="0.5" stroke-width="1.5"/>
  <!-- Card 2: face-up (star symbol) -->
  <rect x="44" y="20" width="32" height="44" rx="5" fill="white" fill-opacity="0.9" filter="url(#shadow)"/>
  <text x="60" y="48" font-family="Arial, sans-serif" font-size="22" text-anchor="middle" fill="#10b981">★</text>
  <!-- Card 3: face-down -->
  <rect x="80" y="30" width="32" height="44" rx="5" fill="white" fill-opacity="0.5" filter="url(#shadow)"/>
  <rect x="84" y="34" width="24" height="36" rx="3" fill="white" fill-opacity="0.3"/>
  <line x1="88" y1="38" x2="104" y2="66" stroke="white" stroke-opacity="0.5" stroke-width="1.5"/>
  <line x1="104" y1="38" x2="88" y2="66" stroke="white" stroke-opacity="0.5" stroke-width="1.5"/>
  <!-- Match indicator bottom -->
  <text x="60" y="85" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white" fill-opacity="0.7">MATCH!</text>
  <line x1="24" y1="90" x2="60" y2="90" stroke="white" stroke-opacity="0.5" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="60" y1="90" x2="96" y2="90" stroke="white" stroke-opacity="0.3" stroke-width="2" stroke-dasharray="4,3"/>
</svg>
