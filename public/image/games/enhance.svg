<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#bg)"/>
  <!-- Sword blade -->
  <polygon points="60,18 54,72 60,78 66,72" fill="white" fill-opacity="0.85" filter="url(#shadow)"/>
  <!-- Sword crossguard -->
  <rect x="44" y="72" width="32" height="7" rx="3" fill="white" fill-opacity="0.75" filter="url(#shadow)"/>
  <!-- Sword grip -->
  <rect x="56" y="79" width="8" height="18" rx="3" fill="white" fill-opacity="0.6" filter="url(#shadow)"/>
  <!-- Upward arrow beside sword -->
  <polygon points="88,50 82,62 85,62 85,80 91,80 91,62 94,62" fill="white" fill-opacity="0.7" filter="url(#shadow)"/>
  <!-- Star sparkle above sword -->
  <polygon points="30,24 32,30 38,30 33,34 35,40 30,36 25,40 27,34 22,30 28,30" fill="white" fill-opacity="0.8" filter="url(#shadow)"/>
  <!-- Small sparkles -->
  <circle cx="78" cy="22" r="3" fill="white" fill-opacity="0.7"/>
  <circle cx="88" cy="32" r="2" fill="white" fill-opacity="0.55"/>
  <circle cx="72" cy="14" r="2" fill="white" fill-opacity="0.6"/>
</svg>
