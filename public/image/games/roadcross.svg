<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="s">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#bg)"/>
  <!-- Road (horizontal stripes) -->
  <rect x="8" y="28" width="104" height="18" rx="2" fill="white" fill-opacity="0.18"/>
  <rect x="8" y="52" width="104" height="18" rx="2" fill="white" fill-opacity="0.18"/>
  <rect x="8" y="76" width="104" height="18" rx="2" fill="white" fill-opacity="0.18"/>
  <!-- Lane dashes on roads -->
  <rect x="20" y="36" width="14" height="4" rx="1" fill="white" fill-opacity="0.45"/>
  <rect x="52" y="36" width="14" height="4" rx="1" fill="white" fill-opacity="0.45"/>
  <rect x="84" y="36" width="14" height="4" rx="1" fill="white" fill-opacity="0.45"/>
  <rect x="30" y="60" width="14" height="4" rx="1" fill="white" fill-opacity="0.45"/>
  <rect x="68" y="60" width="14" height="4" rx="1" fill="white" fill-opacity="0.45"/>
  <!-- Car shape on upper road -->
  <rect x="74" y="30" width="28" height="14" rx="3" fill="white" fill-opacity="0.75" filter="url(#s)"/>
  <rect x="78" y="26" width="18" height="6" rx="2" fill="white" fill-opacity="0.55"/>
  <circle cx="79" cy="44" r="4" fill="white" fill-opacity="0.7"/>
  <circle cx="97" cy="44" r="4" fill="white" fill-opacity="0.7"/>
  <!-- Character at bottom area -->
  <circle cx="60" cy="104" r="7" fill="white" fill-opacity="0.9" filter="url(#s)"/>
  <rect x="55" y="110" width="10" height="6" rx="2" fill="white" fill-opacity="0.7"/>
</svg>
