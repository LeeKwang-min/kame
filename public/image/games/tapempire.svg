<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#bg)"/>
  <!-- Crown shape at top -->
  <polygon points="60,12 48,30 36,20 38,40 82,40 84,20 72,30" fill="white" fill-opacity="0.85" filter="url(#shadow)"/>
  <!-- Crown base band -->
  <rect x="36" y="38" width="48" height="8" rx="2" fill="white" fill-opacity="0.7"/>
  <!-- Crown jewels -->
  <circle cx="60" cy="24" r="4" fill="white" fill-opacity="0.95"/>
  <circle cx="46" cy="28" r="3" fill="white" fill-opacity="0.8"/>
  <circle cx="74" cy="28" r="3" fill="white" fill-opacity="0.8"/>
  <!-- Rising bar chart bars below (increasing height left to right) -->
  <rect x="18" y="88" width="16" height="20" rx="3" fill="white" fill-opacity="0.4" filter="url(#shadow)"/>
  <rect x="38" y="76" width="16" height="32" rx="3" fill="white" fill-opacity="0.55" filter="url(#shadow)"/>
  <rect x="58" y="62" width="16" height="46" rx="3" fill="white" fill-opacity="0.7" filter="url(#shadow)"/>
  <rect x="78" y="50" width="16" height="58" rx="3" fill="white" fill-opacity="0.85" filter="url(#shadow)"/>
  <!-- Trend arrow -->
  <polyline points="18,92 38,80 58,66 86,52" fill="none" stroke="white" stroke-width="2" stroke-opacity="0.6" stroke-dasharray="4,3"/>
</svg>
