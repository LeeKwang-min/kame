<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#bg)"/>
  <!-- T-shaped tetromino (3 cells on top + 1 center below) -->
  <rect x="28" y="24" width="20" height="20" rx="3" fill="white" fill-opacity="0.85" filter="url(#shadow)"/>
  <rect x="50" y="24" width="20" height="20" rx="3" fill="white" fill-opacity="0.85" filter="url(#shadow)"/>
  <rect x="72" y="24" width="20" height="20" rx="3" fill="white" fill-opacity="0.85" filter="url(#shadow)"/>
  <rect x="50" y="46" width="20" height="20" rx="3" fill="white" fill-opacity="0.85" filter="url(#shadow)"/>
  <!-- Filled rows below (representing cleared lines) -->
  <rect x="18" y="74" width="84" height="10" rx="3" fill="white" fill-opacity="0.5"/>
  <rect x="18" y="86" width="84" height="10" rx="3" fill="white" fill-opacity="0.35"/>
  <rect x="18" y="98" width="84" height="10" rx="3" fill="white" fill-opacity="0.2"/>
</svg>
