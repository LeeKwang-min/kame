<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#bg)"/>
  <!-- Faint grid background (5x5) -->
  <line x1="10" y1="10" x2="10" y2="110" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="30" y1="10" x2="30" y2="110" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="50" y1="10" x2="50" y2="110" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="70" y1="10" x2="70" y2="110" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="90" y1="10" x2="90" y2="110" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="110" y1="10" x2="110" y2="110" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="10" y1="10" x2="110" y2="10" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="10" y1="30" x2="110" y2="30" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="10" y1="50" x2="110" y2="50" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="10" y1="70" x2="110" y2="70" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="10" y1="90" x2="110" y2="90" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="10" y1="110" x2="110" y2="110" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <!-- L-shaped piece (top-left area) -->
  <rect x="12" y="12" width="18" height="18" rx="3" fill="white" fill-opacity="0.85" filter="url(#shadow)"/>
  <rect x="12" y="32" width="18" height="18" rx="3" fill="white" fill-opacity="0.85" filter="url(#shadow)"/>
  <rect x="12" y="52" width="18" height="18" rx="3" fill="white" fill-opacity="0.85" filter="url(#shadow)"/>
  <rect x="32" y="52" width="18" height="18" rx="3" fill="white" fill-opacity="0.85" filter="url(#shadow)"/>
  <!-- T-shaped piece (right area) -->
  <rect x="52" y="12" width="18" height="18" rx="3" fill="white" fill-opacity="0.65" filter="url(#shadow)"/>
  <rect x="72" y="12" width="18" height="18" rx="3" fill="white" fill-opacity="0.65" filter="url(#shadow)"/>
  <rect x="92" y="12" width="18" height="18" rx="3" fill="white" fill-opacity="0.65" filter="url(#shadow)"/>
  <rect x="72" y="32" width="18" height="18" rx="3" fill="white" fill-opacity="0.65" filter="url(#shadow)"/>
  <!-- Single block piece (bottom right) -->
  <rect x="92" y="72" width="18" height="18" rx="3" fill="white" fill-opacity="0.45" filter="url(#shadow)"/>
</svg>
