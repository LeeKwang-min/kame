<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#bg)"/>
  <!-- City skyline silhouette (3 buildings) at bottom -->
  <rect x="14" y="78" width="22" height="28" rx="2" fill="white" fill-opacity="0.7" filter="url(#shadow)"/>
  <rect x="18" y="72" width="6" height="8" rx="1" fill="white" fill-opacity="0.7"/>
  <rect x="49" y="68" width="26" height="38" rx="2" fill="white" fill-opacity="0.7" filter="url(#shadow)"/>
  <rect x="54" y="62" width="6" height="8" rx="1" fill="white" fill-opacity="0.7"/>
  <rect x="84" y="74" width="22" height="32" rx="2" fill="white" fill-opacity="0.7" filter="url(#shadow)"/>
  <rect x="88" y="68" width="6" height="8" rx="1" fill="white" fill-opacity="0.7"/>
  <!-- Ground line -->
  <rect x="10" y="104" width="100" height="4" rx="2" fill="white" fill-opacity="0.4"/>
  <!-- Missile arc path (coming from top, curving down) -->
  <path d="M88 18 Q72 50 50 76" stroke="white" stroke-opacity="0.75" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Missile tip -->
  <polygon points="88,18 82,14 84,22" fill="white" fill-opacity="0.9"/>
  <!-- Explosion circle at intercept -->
  <circle cx="50" cy="74" r="8" fill="white" fill-opacity="0.25"/>
  <circle cx="50" cy="74" r="4" fill="white" fill-opacity="0.55"/>
  <!-- Second missile arc -->
  <path d="M32 14 Q40 40 58 62" stroke="white" stroke-opacity="0.5" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <polygon points="32,14 26,12 30,20" fill="white" fill-opacity="0.7"/>
</svg>
