<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#bg)"/>
  <!-- 3 playing cards fanned out (overlapping rectangles) -->
  <!-- Card 3 (back, leftmost) -->
  <rect x="14" y="28" width="44" height="60" rx="6" fill="white" fill-opacity="0.5" filter="url(#shadow)" transform="rotate(-12, 36, 58)"/>
  <!-- Card 2 (middle) -->
  <rect x="26" y="24" width="44" height="60" rx="6" fill="white" fill-opacity="0.7" filter="url(#shadow)" transform="rotate(-4, 48, 54)"/>
  <!-- Card 1 (front, rightmost) -->
  <rect x="42" y="22" width="44" height="60" rx="6" fill="white" fill-opacity="0.92" filter="url(#shadow)"/>
  <!-- Card front details: suit symbol + corner number -->
  <text x="50" y="38" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="start" fill="#ef4444">A</text>
  <text x="50" y="50" font-family="Arial, sans-serif" font-size="11" text-anchor="start" fill="#ef4444">♥</text>
  <!-- Large center suit -->
  <text x="64" y="62" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="#ef4444">♥</text>
  <!-- Bottom corner (upside down) -->
  <text x="78" y="76" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="end" fill="#ef4444">A</text>
</svg>
