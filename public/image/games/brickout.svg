<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#bg)"/>
  <!-- Row of 4 bricks at top -->
  <rect x="14" y="22" width="20" height="12" rx="3" fill="white" fill-opacity="0.9" filter="url(#shadow)"/>
  <rect x="36" y="22" width="20" height="12" rx="3" fill="white" fill-opacity="0.9" filter="url(#shadow)"/>
  <rect x="58" y="22" width="20" height="12" rx="3" fill="white" fill-opacity="0.9" filter="url(#shadow)"/>
  <rect x="80" y="22" width="20" height="12" rx="3" fill="white" fill-opacity="0.9" filter="url(#shadow)"/>
  <!-- Second row of bricks (offset) -->
  <rect x="25" y="36" width="20" height="12" rx="3" fill="white" fill-opacity="0.7"/>
  <rect x="47" y="36" width="20" height="12" rx="3" fill="white" fill-opacity="0.7"/>
  <rect x="69" y="36" width="20" height="12" rx="3" fill="white" fill-opacity="0.7"/>
  <!-- Ball -->
  <circle cx="60" cy="72" r="7" fill="white" fill-opacity="0.9" filter="url(#shadow)"/>
  <!-- Paddle at bottom -->
  <rect x="30" y="94" width="52" height="10" rx="5" fill="white" fill-opacity="0.85" filter="url(#shadow)"/>
</svg>
