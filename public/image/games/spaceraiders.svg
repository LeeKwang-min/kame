<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#bg)"/>
  <!-- Enemy 1 (left) - classic invader shape -->
  <rect x="18" y="24" width="22" height="14" rx="4" fill="white" fill-opacity="0.8"/>
  <rect x="14" y="32" width="8" height="8" rx="2" fill="white" fill-opacity="0.8"/>
  <rect x="36" y="32" width="8" height="8" rx="2" fill="white" fill-opacity="0.8"/>
  <rect x="22" y="38" width="6" height="6" rx="1" fill="white" fill-opacity="0.5"/>
  <rect x="30" y="38" width="6" height="6" rx="1" fill="white" fill-opacity="0.5"/>
  <!-- Enemy 2 (center) -->
  <rect x="49" y="24" width="22" height="14" rx="4" fill="white" fill-opacity="0.8"/>
  <rect x="45" y="32" width="8" height="8" rx="2" fill="white" fill-opacity="0.8"/>
  <rect x="67" y="32" width="8" height="8" rx="2" fill="white" fill-opacity="0.8"/>
  <rect x="53" y="38" width="6" height="6" rx="1" fill="white" fill-opacity="0.5"/>
  <rect x="61" y="38" width="6" height="6" rx="1" fill="white" fill-opacity="0.5"/>
  <!-- Enemy 3 (right) -->
  <rect x="80" y="24" width="22" height="14" rx="4" fill="white" fill-opacity="0.8"/>
  <rect x="76" y="32" width="8" height="8" rx="2" fill="white" fill-opacity="0.8"/>
  <rect x="98" y="32" width="8" height="8" rx="2" fill="white" fill-opacity="0.8"/>
  <rect x="84" y="38" width="6" height="6" rx="1" fill="white" fill-opacity="0.5"/>
  <rect x="92" y="38" width="6" height="6" rx="1" fill="white" fill-opacity="0.5"/>
  <!-- Bullet/laser -->
  <rect x="58" y="58" width="4" height="12" rx="2" fill="white" fill-opacity="0.75"/>
  <!-- Player ship at bottom (triangle) -->
  <polygon points="60,90 44,110 60,105 76,110" fill="white" fill-opacity="0.9" filter="url(#shadow)"/>
  <!-- Platform base -->
  <rect x="30" y="108" width="60" height="6" rx="3" fill="white" fill-opacity="0.5"/>
</svg>
