<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#bg)"/>
  <!-- 3 vertical lines (ladder rails) -->
  <line x1="26" y1="28" x2="26" y2="100" stroke="white" stroke-width="4" stroke-opacity="0.8" stroke-linecap="round"/>
  <line x1="60" y1="28" x2="60" y2="100" stroke="white" stroke-width="4" stroke-opacity="0.8" stroke-linecap="round"/>
  <line x1="94" y1="28" x2="94" y2="100" stroke="white" stroke-width="4" stroke-opacity="0.8" stroke-linecap="round"/>
  <!-- Horizontal bridge lines connecting them -->
  <line x1="26" y1="46" x2="60" y2="46" stroke="white" stroke-width="3" stroke-opacity="0.65" stroke-linecap="round"/>
  <line x1="60" y1="62" x2="94" y2="62" stroke="white" stroke-width="3" stroke-opacity="0.65" stroke-linecap="round"/>
  <line x1="26" y1="78" x2="60" y2="78" stroke="white" stroke-width="3" stroke-opacity="0.65" stroke-linecap="round"/>
  <line x1="60" y1="94" x2="94" y2="94" stroke="white" stroke-width="3" stroke-opacity="0.65" stroke-linecap="round"/>
  <!-- Dots at top of each rail -->
  <circle cx="26" cy="24" r="6" fill="white" fill-opacity="0.85" filter="url(#shadow)"/>
  <circle cx="60" cy="24" r="6" fill="white" fill-opacity="0.85" filter="url(#shadow)"/>
  <circle cx="94" cy="24" r="6" fill="white" fill-opacity="0.85" filter="url(#shadow)"/>
  <!-- Small player indicator dot on one of the rungs -->
  <circle cx="43" cy="46" r="5" fill="white" fill-opacity="0.7" filter="url(#shadow)"/>
</svg>
