<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="s">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#bg)"/>
  <!-- Top pipe -->
  <rect x="78" y="10" width="22" height="38" rx="3" fill="white" fill-opacity="0.6" filter="url(#s)"/>
  <rect x="75" y="44" width="28" height="6" rx="2" fill="white" fill-opacity="0.75" filter="url(#s)"/>
  <!-- Bottom pipe -->
  <rect x="78" y="74" width="22" height="40" rx="3" fill="white" fill-opacity="0.6" filter="url(#s)"/>
  <rect x="75" y="70" width="28" height="6" rx="2" fill="white" fill-opacity="0.75" filter="url(#s)"/>
  <!-- Bird body -->
  <ellipse cx="42" cy="62" rx="18" ry="13" fill="white" fill-opacity="0.9" filter="url(#s)"/>
  <!-- Wing -->
  <ellipse cx="40" cy="70" rx="12" ry="7" fill="white" fill-opacity="0.55" transform="rotate(-20 40 70)"/>
  <!-- Eye -->
  <circle cx="52" cy="58" r="4" fill="white" fill-opacity="0.9"/>
  <circle cx="53" cy="58" r="2" fill="#3b82f6"/>
  <!-- Beak -->
  <polygon points="60,61 68,64 60,67" fill="white" fill-opacity="0.85"/>
</svg>
