<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eab308"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#bg)"/>
  <!-- Outer circle -->
  <circle cx="60" cy="60" r="36" fill="none" stroke="white" stroke-width="3" stroke-opacity="0.7"/>
  <!-- Inner circle -->
  <circle cx="60" cy="60" r="20" fill="none" stroke="white" stroke-width="2.5" stroke-opacity="0.85"/>
  <!-- Crosshair lines -->
  <line x1="60" y1="18" x2="60" y2="36" stroke="white" stroke-width="2.5" stroke-opacity="0.85"/>
  <line x1="60" y1="84" x2="60" y2="102" stroke="white" stroke-width="2.5" stroke-opacity="0.85"/>
  <line x1="18" y1="60" x2="36" y2="60" stroke="white" stroke-width="2.5" stroke-opacity="0.85"/>
  <line x1="84" y1="60" x2="102" y2="60" stroke="white" stroke-width="2.5" stroke-opacity="0.85"/>
  <!-- Center dot -->
  <circle cx="60" cy="60" r="5" fill="white" fill-opacity="0.95" filter="url(#shadow)"/>
</svg>
