<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#bg)"/>
  <!-- 3 diamond/gem shapes in a row (match-3 style) -->
  <!-- Diamond 1 (left) -->
  <polygon points="22,60 36,42 50,60 36,78" fill="white" fill-opacity="0.85" filter="url(#shadow)"/>
  <polygon points="22,60 36,42 50,60" fill="white" fill-opacity="0.4"/>
  <!-- Diamond 2 (center, slightly larger) -->
  <polygon points="46,60 60,38 74,60 60,82" fill="white" fill-opacity="0.9" filter="url(#shadow)"/>
  <polygon points="46,60 60,38 74,60" fill="white" fill-opacity="0.45"/>
  <!-- Diamond 3 (right) -->
  <polygon points="70,60 84,42 98,60 84,78" fill="white" fill-opacity="0.7" filter="url(#shadow)"/>
  <polygon points="70,60 84,42 98,60" fill="white" fill-opacity="0.35"/>
  <!-- Sparkle dots above gems (match-3 effect) -->
  <circle cx="36" cy="32" r="3" fill="white" fill-opacity="0.8"/>
  <circle cx="60" cy="28" r="4" fill="white" fill-opacity="0.9"/>
  <circle cx="84" cy="32" r="3" fill="white" fill-opacity="0.7"/>
  <!-- Small star sparks -->
  <line x1="60" y1="22" x2="60" y2="26" stroke="white" stroke-opacity="0.8" stroke-width="2"/>
  <line x1="56" y1="24" x2="64" y2="24" stroke="white" stroke-opacity="0.8" stroke-width="2"/>
</svg>
