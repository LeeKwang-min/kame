<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#bg)"/>
  <!-- White board rectangle -->
  <rect x="12" y="20" width="86" height="68" rx="5" fill="white" fill-opacity="0.85" filter="url(#shadow)"/>
  <!-- Scribble/drawing lines on board -->
  <polyline points="22,42 36,30 50,44 64,34 78,46" fill="none" stroke="#f43f5e" stroke-width="2.5" stroke-opacity="0.7" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="22,62 32,56 44,66 56,52 70,60 82,54" fill="none" stroke="#e11d48" stroke-width="2" stroke-opacity="0.6" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="24,76 40,72 54,78 70,70" fill="none" stroke="#f43f5e" stroke-width="2" stroke-opacity="0.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Pencil shape (right side) -->
  <rect x="98" y="30" width="10" height="50" rx="3" fill="white" fill-opacity="0.75" filter="url(#shadow)" transform="rotate(25,103,55)"/>
  <polygon points="98,76 108,76 103,88" fill="white" fill-opacity="0.85" transform="rotate(25,103,76)"/>
  <!-- Board stand / tray -->
  <rect x="12" y="86" width="86" height="6" rx="2" fill="white" fill-opacity="0.6"/>
  <!-- Board legs -->
  <line x1="32" y1="92" x2="28" y2="106" stroke="white" stroke-width="3" stroke-opacity="0.6" stroke-linecap="round"/>
  <line x1="78" y1="92" x2="82" y2="106" stroke="white" stroke-width="3" stroke-opacity="0.6" stroke-linecap="round"/>
</svg>
