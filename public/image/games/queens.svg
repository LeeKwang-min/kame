<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#bg)"/>
  <!-- 4x4 checkerboard pattern -->
  <!-- Row 1: dark, light, dark, light -->
  <rect x="12" y="12" width="24" height="24" rx="2" fill="white" fill-opacity="0.2"/>
  <rect x="36" y="12" width="24" height="24" rx="2" fill="white" fill-opacity="0.5"/>
  <rect x="60" y="12" width="24" height="24" rx="2" fill="white" fill-opacity="0.2"/>
  <rect x="84" y="12" width="24" height="24" rx="2" fill="white" fill-opacity="0.5"/>
  <!-- Row 2: light, dark, light, dark -->
  <rect x="12" y="36" width="24" height="24" rx="2" fill="white" fill-opacity="0.5"/>
  <rect x="36" y="36" width="24" height="24" rx="2" fill="white" fill-opacity="0.2"/>
  <rect x="60" y="36" width="24" height="24" rx="2" fill="white" fill-opacity="0.5"/>
  <rect x="84" y="36" width="24" height="24" rx="2" fill="white" fill-opacity="0.2"/>
  <!-- Row 3: dark, light, dark, light -->
  <rect x="12" y="60" width="24" height="24" rx="2" fill="white" fill-opacity="0.2"/>
  <rect x="36" y="60" width="24" height="24" rx="2" fill="white" fill-opacity="0.5"/>
  <rect x="60" y="60" width="24" height="24" rx="2" fill="white" fill-opacity="0.2"/>
  <rect x="84" y="60" width="24" height="24" rx="2" fill="white" fill-opacity="0.5"/>
  <!-- Row 4: light, dark, light, dark -->
  <rect x="12" y="84" width="24" height="24" rx="2" fill="white" fill-opacity="0.5"/>
  <rect x="36" y="84" width="24" height="24" rx="2" fill="white" fill-opacity="0.2"/>
  <rect x="60" y="84" width="24" height="24" rx="2" fill="white" fill-opacity="0.5"/>
  <rect x="84" y="84" width="24" height="24" rx="2" fill="white" fill-opacity="0.2"/>
  <!-- Crown on cell (1,0) - top-right light cell -->
  <text x="96" y="30" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="white" fill-opacity="0.95" filter="url(#shadow)">♛</text>
</svg>
