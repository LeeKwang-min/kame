<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="white" flood-opacity="0.6"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#bg)"/>
  <!-- 3x3 grid: bright = ON, dim = OFF -->
  <!-- Row 1: dim, bright, dim -->
  <rect x="12" y="12" width="30" height="30" rx="5" fill="white" fill-opacity="0.25"/>
  <rect x="45" y="12" width="30" height="30" rx="5" fill="white" fill-opacity="0.9" filter="url(#glow)"/>
  <rect x="78" y="12" width="30" height="30" rx="5" fill="white" fill-opacity="0.25"/>
  <!-- Row 2: bright, bright, bright -->
  <rect x="12" y="45" width="30" height="30" rx="5" fill="white" fill-opacity="0.9" filter="url(#glow)"/>
  <rect x="45" y="45" width="30" height="30" rx="5" fill="white" fill-opacity="0.9" filter="url(#glow)"/>
  <rect x="78" y="45" width="30" height="30" rx="5" fill="white" fill-opacity="0.9" filter="url(#glow)"/>
  <!-- Row 3: dim, bright, dim -->
  <rect x="12" y="78" width="30" height="30" rx="5" fill="white" fill-opacity="0.25"/>
  <rect x="45" y="78" width="30" height="30" rx="5" fill="white" fill-opacity="0.9" filter="url(#glow)"/>
  <rect x="78" y="78" width="30" height="30" rx="5" fill="white" fill-opacity="0.25"/>
</svg>
