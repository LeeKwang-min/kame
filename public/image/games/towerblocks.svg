<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="s">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#bg)"/>
  <!-- Tower blocks stacked (slightly different widths) -->
  <!-- Base block -->
  <rect x="22" y="94" width="76" height="16" rx="3" fill="white" fill-opacity="0.85" filter="url(#s)"/>
  <!-- Block 2 -->
  <rect x="25" y="76" width="70" height="16" rx="3" fill="white" fill-opacity="0.8" filter="url(#s)"/>
  <!-- Block 3 -->
  <rect x="28" y="58" width="65" height="16" rx="3" fill="white" fill-opacity="0.75" filter="url(#s)"/>
  <!-- Block 4 -->
  <rect x="26" y="40" width="60" height="16" rx="3" fill="white" fill-opacity="0.7" filter="url(#s)"/>
  <!-- Moving block above (slightly offset to show it's dropping) -->
  <rect x="40" y="16" width="56" height="16" rx="3" fill="white" fill-opacity="0.55" filter="url(#s)"/>
  <!-- Dotted line showing drop path -->
  <line x1="68" y1="33" x2="68" y2="39" stroke="white" stroke-width="2" stroke-opacity="0.4" stroke-dasharray="3,3"/>
</svg>
